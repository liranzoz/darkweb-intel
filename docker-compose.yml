services:
  tor:
    build: ./tor
    ports:
      - "127.0.0.1:9050:9050"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: intel
      POSTGRES_PASSWORD: changeme_local
      POSTGRES_DB: darkweb
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
